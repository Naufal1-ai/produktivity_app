name: productivity
description: A new Flutter project.
publish_to: 'none'
version: 2.4.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  firebase_core: ^3.1.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.1
  intl: 0.20.2
  google_sign_in: ^6.2.1
  shared_preferences: ^2.3.2
  provider: ^6.0.6
  fl_chart: ^0.69.0
  flutter_localizations:
    sdk: flutter
  csv: ^6.0.0
  pdf: ^3.10.7
  printing: ^5.13.3
  flutter_local_notifications: ^17.2.2
  path_provider: ^2.1.3
  flutter_dotenv: ^6.0.1
  url_launcher: ^6.3.2
  image_picker: ^1.1.2
  mix: ^2.0.3
  msix: ^3.16.13

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_gen_runner: ^5.4.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#F8FAFC"
  image: "assets/logo.png"
  color_dark: "#0F1117"
  image_dark: "assets/logo.png"
  android_12:
    image: "assets/logo.png"
    icon_background_color: "#F8FAFC"
    image_dark: "assets/logo.png"
    icon_background_color_dark: "#0F1117"

flutter:
  uses-material-design: true
  generate: true
  assets:
    - .env
    - assets/logo.png
